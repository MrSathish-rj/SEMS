<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEMS live chart </title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <!-- ========== SECTION 4: REAL-TIME CHARTS ========== -->
    <section class="section-header">
      <h2>📈 Real-Time Charts</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="chart-note" style="display:flex;align-items:center;gap:6px;">
          <span style="width:7px;height:7px;border-radius:50%;background:#00ff9c;display:inline-block;animation:livePulseDB 1.4s infinite;box-shadow:0 0 0 0 rgba(0,255,156,.6);"></span>
          Live 20-pt rolling window
        </div>
        <a class="btn-secondary" href="chart.html" target="_blank" style="font-size:11px;padding:4px 12px;">Back to main</a>
      </div>
    </section>

    <!-- Inline animated chart panel -->
    <div class="glass" id="inlineChartPanel" style="border-radius:16px;padding:16px 20px 20px;margin-bottom:0;position:relative;overflow:hidden;">

      <!-- animated top border -->
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00d4ff,#7c3aed,#00ff9c);background-size:200%;animation:chartGradMove 3s linear infinite;border-radius:16px 16px 0 0;"></div>

      <!-- mini live values row -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;margin-top:4px;">
        <!-- Power -->
        <div style="background:rgba(255,214,0,0.07);border:1px solid rgba(255,214,0,0.15);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">💡</span>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;">Power</div>
            <div style="font-size:18px;font-weight:800;color:#ffd600;font-variant-numeric:tabular-nums;line-height:1;"><span id="db_chartPowerVal">--</span><span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);margin-left:2px;">W</span></div>
          </div>
        </div>
        <!-- Voltage -->
        <div style="background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.15);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">🔌</span>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;">Voltage</div>
            <div style="font-size:18px;font-weight:800;color:#00d4ff;font-variant-numeric:tabular-nums;line-height:1;"><span id="db_chartVoltageVal">--</span><span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);margin-left:2px;">V</span></div>
          </div>
        </div>
        <!-- Current -->
        <div style="background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.15);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">⚡</span>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;">Current</div>
            <div style="font-size:18px;font-weight:800;color:#b399ff;font-variant-numeric:tabular-nums;line-height:1;"><span id="db_chartCurrentVal">--</span><span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);margin-left:2px;">A</span></div>
          </div>
        </div>
        <!-- Cost -->
        <div style="background:rgba(0,255,156,0.07);border:1px solid rgba(0,255,156,0.15);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">💰</span>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;">Cost</div>
            <div style="font-size:18px;font-weight:800;color:#00ff9c;font-variant-numeric:tabular-nums;line-height:1;">RM <span id="db_chartCostVal">--</span></div>
          </div>
        </div>
      </div>

      <!-- 2×2 chart grid inline -->
      <div class="charts-grid">
        <div class="glass chart-card" style="position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;width:50px;height:2px;background:#ffd600;border-radius:0 0 2px 0;"></div>
          <div class="chart-header">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,0.5);">Active Power (W)</span>
            <span class="chart-live" id="chartPowerValue" style="color:#ffd600;">-- W</span>
          </div>
          <canvas id="powerChart" height="120"></canvas>
        </div>
        <div class="glass chart-card" style="position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;width:50px;height:2px;background:#00d4ff;border-radius:0 0 2px 0;"></div>
          <div class="chart-header">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,0.5);">Voltage (V)</span>
            <span class="chart-live" id="chartVoltageValue" style="color:#00d4ff;">-- V</span>
          </div>
          <canvas id="voltageChart" height="120"></canvas>
        </div>
        <div class="glass chart-card" style="position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;width:50px;height:2px;background:#7c3aed;border-radius:0 0 2px 0;"></div>
          <div class="chart-header">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,0.5);">Current (A)</span>
            <span class="chart-live" id="chartCurrentValue" style="color:#b399ff;">-- A</span>
          </div>
          <canvas id="currentChart" height="120"></canvas>
        </div>
        <div class="glass chart-card" style="position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;width:50px;height:2px;background:#00ff9c;border-radius:0 0 2px 0;"></div>
          <div class="chart-header">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,0.5);">Energy Cost (RM)</span>
            <span class="chart-live" id="chartCostValue" style="color:#00ff9c;">-- RM</span>
          </div>
          <canvas id="costChart" height="120"></canvas>
        </div>
      </div>

    
    <!-- Inline chart styles + animations -->
    <style>
      @keyframes livePulseDB {
        0%,100% { box-shadow: 0 0 0 0 rgba(0,255,156,.6); }
        50%      { box-shadow: 0 0 0 5px rgba(0,255,156,0); }
      }
      @keyframes chartGradMove {
        0%   { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
      .chart-card-flash-pwr  { animation: dbFlashY .5s ease-out; }
      .chart-card-flash-volt { animation: dbFlashB .5s ease-out; }
      .chart-card-flash-amp  { animation: dbFlashP .5s ease-out; }
      .chart-card-flash-cost { animation: dbFlashG .5s ease-out; }
      @keyframes dbFlashY { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px rgba(255,214,0,.3)} }
      @keyframes dbFlashB { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px rgba(0,212,255,.3)} }
      @keyframes dbFlashP { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px rgba(124,58,237,.3)} }
      @keyframes dbFlashG { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px rgba(0,255,156,.3)} }
    </style>

    <script>
    /* ── Dashboard inline waveform ── */
    (function() {
      const canvas = document.getElementById('db_waveCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let t = 0, pw = 0;
      window._dbWaveSetPower = v => { pw = v; };

      function resize() {
        canvas.width  = canvas.parentElement.clientWidth - 24;
        canvas.height = 60;
      }
      resize();
      window.addEventListener('resize', resize);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const W = canvas.width, H = canvas.height;
        const amp = Math.max(4, Math.min(pw / 22, H * 0.4));
        const grad = ctx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0,   'rgba(0,212,255,.85)');
        grad.addColorStop(0.5, 'rgba(124,58,237,.85)');
        grad.addColorStop(1,   'rgba(0,255,156,.85)');
        ctx.beginPath();
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.6;
        ctx.shadowColor = 'rgba(0,212,255,.4)';
        ctx.shadowBlur = 6;
        for (let x = 0; x < W; x++) {
          const y = H / 2 - (Math.sin((x + t) * 0.04) * amp + Math.sin((x + t) * 0.09) * amp * 0.25 + (Math.random() - 0.5) * 0.6);
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        t += 2.5;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Mirror live values to the inline mini cards ── */
    (function() {
      const origListener = window.startFirebaseListeners;
      const originalAddChartData = window.addChartData;

      /* hook into Firebase sensor updates via a secondary ref listener */
      document.addEventListener('DOMContentLoaded', () => {
        /* wait for firebase to init then attach a mirror listener */
        const tryAttach = setInterval(() => {
          if (typeof firebase === 'undefined' || !firebase.apps.length) return;
          clearInterval(tryAttach);

          firebase.database().ref('sems/sensors').on('value', snap => {
            const d = snap.val();
            if (!d) return;
            const p = parseFloat(d.power   || 0);
            const v = parseFloat(d.voltage || 0);
            const i = parseFloat(d.current || 0);
            const e = parseFloat(d.energy  || 0);
            const c = (e * 0.571);

            const s = el => document.getElementById(el);
            if (s('db_chartPowerVal'))   s('db_chartPowerVal').textContent   = p.toFixed(1);
            if (s('db_chartVoltageVal')) s('db_chartVoltageVal').textContent = v.toFixed(1);
            if (s('db_chartCurrentVal')) s('db_chartCurrentVal').textContent = i.toFixed(2);
            if (s('db_chartCostVal'))    s('db_chartCostVal').textContent    = c.toFixed(4);
            if (window._dbWaveSetPower)  window._dbWaveSetPower(p);
          });
        }, 200);
      });
    })();
    </script>

  </main><!-- end dashboard-main -->

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
